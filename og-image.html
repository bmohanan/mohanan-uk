<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG Image — Bimal Mohanan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(ellipse at 18% 22%, rgba(0,217,255,0.20), transparent 55%),
                radial-gradient(ellipse at 82% 80%, rgba(255,46,200,0.18), transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(177,92,255,0.10), transparent 60%),
                #050510;
    color: #fff;
    position: relative;
  }
  /* Grid background */
  body::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
  }
  /* Floating orbs */
  body::after {
    content: "";
    position: absolute;
    top: -120px; right: -120px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,217,255,0.35), transparent 70%);
    filter: blur(40px);
  }
  .wrap {
    position: relative;
    z-index: 2;
    width: 100%; height: 100%;
    padding: 76px 80px;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #00d9ff;
    box-shadow: 0 0 16px #00d9ff;
  }
  .center {
    margin-top: 28px;
  }
  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 110px;
    line-height: 1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 0%, #b1d8ff 45%, #b15cff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .role {
    margin-top: 22px;
    font-size: 36px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .role .accent {
    background: linear-gradient(135deg, #00d9ff, #b15cff 60%, #ff2ec8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 600;
  }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.78);
    letter-spacing: 0.04em;
  }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: #00d9ff;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="dot"></span>
      <span>Cloud · Delivered</span>
    </div>
    <div class="center">
      <div class="name">Bimal Mohanan</div>
      <div class="role">Cloud Transformation Leader<br/><span class="accent">AWS &amp; Azure · Pre-Sales · Delivery</span></div>
    </div>
    <div class="bottom">
      <div class="chips">
        <span class="chip">13+ yrs in cloud</span>
        <span class="chip">125% FY revenue</span>
        <span class="chip">3× pipeline</span>
        <span class="chip">London · EMEA</span>
      </div>
      <div class="url">mohanan.uk</div>
    </div>
  </div>
</body>
</html>
